# 2bleA — Nginx Production Configuration
# Place in: /etc/nginx/sites-available/2blea
# Enable: ln -s /etc/nginx/sites-available/2blea /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: systemctl reload nginx

upstream 2blea_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name 2blea.com www.2blea.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 2blea.com www.2blea.com;

    # SSL — managed by certbot
    ssl_certificate /etc/letsencrypt/live/2blea.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/2blea.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/2blea.com/chain.pem;

    # Modern TLS config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Static assets — long cache
    location /_next/static {
        proxy_pass http://2blea_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static {
        proxy_pass http://2blea_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # File uploads
    location /api/upload/ {
        proxy_pass http://2blea_app;
        client_max_body_size 100M;
        proxy_request_buffering off;
    }

    # Main proxy
    location / {
        proxy_pass http://2blea_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Healthcheck — don't log
    location /api/health {
        proxy_pass http://2blea_app;
        access_log off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive paths
    location ~ ^/(\.env|\.git|node_modules|prisma|scripts) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
